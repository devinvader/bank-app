spring:
  config:
    import: classpath:application-test-common.yaml
  datasource:
    hikari:
      connection-init-sql: SET search_path TO notifications,public
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: notifications
    liquibase-schema: public
  kafka:
    listener:
      auto-startup: false
      ack-mode: record
    consumer:
      group-id: notifications-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.devinvader.bank.common.config.NotificationDeserializer
