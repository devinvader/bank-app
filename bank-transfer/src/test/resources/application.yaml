spring:
  config:
    import: ""
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientServletAutoConfiguration
      - org.springframework.cloud.consul.ConsulAutoConfiguration
      - org.springframework.cloud.consul.discovery.ConsulDiscoveryClientAutoConfiguration
  application:
    name: bank-transfer-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS transfer
    username: sa
    password:
    driver-class-name: org.h2.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public
  cloud:
    consul:
      enabled: false
      discovery:
        enabled: false
      config:
        enabled: false
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: bank-transfer
            client-secret: test-secret
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          keycloak:
            issuer-uri: http://localhost:8089/realms/bank

resilience4j:
  circuitbreaker:
    enabled: false

server:
  port: 0
