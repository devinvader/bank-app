databaseChangeLog:
  - changeSet:
      id: 001-create-notifications-schema
      author: devinvader
      changes:
        - sql:
            sql: CREATE SCHEMA IF NOT EXISTS notifications
  - changeSet:
      id: 001-create-notifications-table
      author: devinvader
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: sent_at
                  type: TIMESTAMP
        - createIndex:
            indexName: idx_notifications_status
            tableName: notifications
            columns:
              - column:
                  name: status
