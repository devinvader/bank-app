spring:
  application:
    name: bank-cash
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bank}?currentSchema=cash
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  lifecycle:
    timeout-per-shutdown-phase: 30s
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8089}/realms/${KEYCLOAK_REALM:bank}/protocol/openid-connect/certs
      client:
        registration:
          keycloak:
            client-id: bank-cash
            client-secret: ${KEYCLOAK_CLIENT_SECRET:cash-secret}
            authorization-grant-type: client_credentials
            scope: openid,accounts:read,accounts:write
        provider:
          keycloak:
            token-uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8089}/realms/${KEYCLOAK_REALM:bank}/protocol/openid-connect/token
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      accountsService:
        base-config: default
        ignore-exceptions:
          - ru.devinvader.bank.common.exception.InsufficientBalanceException
          - ru.devinvader.bank.common.exception.AccountNotFoundException

kafka:
  topic:
    notifications:
      name: ${KAFKA_TOPIC_NOTIFICATIONS:notifications}

accounts:
  base-url: ${ACCOUNTS_BASE_URL:http://bank-accounts}

server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
