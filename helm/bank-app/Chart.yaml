apiVersion: v2
name: bank-app
description: Chart для bank app
type: application
version: 0.1.0

dependencies:
  - name: microservice-lib
    version: 0.1.0
  - name: postgres
    version: 0.1.0
    condition: postgres.enabled
  - name: redis
    version: 0.1.0
    condition: redis.enabled
  - name: kafka
    version: 0.1.0
    condition: kafka.enabled
  - name: keycloak
    version: 0.1.0
    condition: keycloak.enabled
  - name: zipkin
    version: 0.1.0
    condition: zipkin.enabled
  - name: prometheus
    version: 0.1.0
    condition: prometheus.enabled
  - name: grafana
    version: 0.1.0
    condition: grafana.enabled
  - name: elk
    version: 0.1.0
    condition: elk.enabled
  - name: bank-accounts
    version: 0.1.0
    condition: bank-accounts.enabled
  - name: bank-cash
    version: 0.1.0
    condition: bank-cash.enabled
  - name: bank-transfer
    version: 0.1.0
    condition: bank-transfer.enabled
  - name: bank-notifications
    version: 0.1.0
    condition: bank-notifications.enabled
  - name: bank-gateway
    version: 0.1.0
    condition: bank-gateway.enabled
  - name: bank-front-ui
    version: 0.1.0
    condition: bank-front-ui.enabled
