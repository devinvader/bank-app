spring:
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  cloud:
    zookeeper:
      enabled: false
      discovery:
        enabled: false
      config:
        enabled: false
  application:
    name: bank-gateway-test
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8089/realms/bank

resilience4j:
  circuitbreaker:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 0
