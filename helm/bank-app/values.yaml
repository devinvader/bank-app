global:
  image:
    registry: ""
    tag: latest
    pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  host: ""
  annotations: {}

postgres:
  enabled: true
  replicaCount: 1
  image:
    repository: postgres
    tag: "15"
  service:
    name: postgres
    port: 5432
  storage:
    size: 1Gi
    storageClass: ""
  config:
    database: bank
    username: postgres
  secrets:
    password: postgres

redis:
  enabled: true
  replicaCount: 1
  image:
    repository: redis
    tag: 7-alpine
  service:
    name: redis
    port: 6379
  config:
    host: redis
    port: "6379"

keycloak:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/keycloak/keycloak
    tag: latest
  service:
    name: keycloak
    port: 80
    targetPort: 8089
  config:
    realm: bank
    dbHost: postgres
    dbPort: "5432"
    dbName: bank
    dbUsername: postgres
  secrets:
    adminUsername: admin
    adminPassword: admin
    dbPassword: postgres

bank-accounts:
  enabled: true
  replicaCount: 1
  image:
    repository: bank-accounts
  service:
    name: bank-accounts
    port: 80
    targetPort: 8082
  config:
    data:
      IMPORT_DEMO_DATA: "true"
  secret:
    data:
      KEYCLOAK_CLIENT_SECRET: accounts-secret

bank-cash:
  enabled: true
  replicaCount: 1
  image:
    repository: bank-cash
  service:
    name: bank-cash
    port: 80
    targetPort: 8083
  config:
    data:
      ACCOUNTS_BASE_URL: "http://bank-accounts"
      NOTIFICATIONS_BASE_URL: "http://bank-notifications"
  secret:
    data:
      KEYCLOAK_CLIENT_SECRET: cash-secret

bank-transfer:
  enabled: true
  replicaCount: 1
  image:
    repository: bank-transfer
  service:
    name: bank-transfer
    port: 80
    targetPort: 8084
  config:
    data:
      ACCOUNTS_BASE_URL: "http://bank-accounts"
      NOTIFICATIONS_BASE_URL: "http://bank-notifications"
  secret:
    data:
      KEYCLOAK_CLIENT_SECRET: transfer-secret

bank-notifications:
  enabled: true
  replicaCount: 1
  image:
    repository: bank-notifications
  service:
    name: bank-notifications
    port: 80
    targetPort: 8085
  config:
    data: {}
  secret:
    data: {}

bank-gateway:
  enabled: true
  replicaCount: 1
  image:
    repository: bank-gateway
  service:
    name: bank-gateway
    port: 80
    targetPort: 8081
  config:
    data:
      FRONT_UI_ORIGIN: "http://localhost"
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: "80"

bank-front-ui:
  enabled: true
  replicaCount: 1
  image:
    repository: bank-front-ui
  service:
    name: bank-front-ui
    port: 80
    targetPort: 8080
  config:
    data:
      APP_BASE_URL: "http://localhost"
      GATEWAY_SERVICE_ID: bank-gateway
      KEYCLOAK_EXTERNAL_URL: "http://localhost"
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: "80"
