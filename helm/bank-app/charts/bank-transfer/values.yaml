replicaCount: 1
image:
  repository: bank-transfer
  tag: latest
  pullPolicy: IfNotPresent
service:
  name: bank-transfer
  port: 80
  targetPort: 8084
config:
  data:
    SERVER_PORT: "8084"
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: bank
    DB_USERNAME: postgres
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/bank?currentSchema=transfer"
    KEYCLOAK_HOST: keycloak
    KEYCLOAK_PORT: "80"
    KEYCLOAK_REALM: bank
    ACCOUNTS_BASE_URL: "http://bank-accounts"
    KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    KAFKA_TOPIC_NOTIFICATIONS: "notifications"
secret:
  data:
    DB_PASSWORD: postgres
    KEYCLOAK_CLIENT_SECRET: transfer-secret
