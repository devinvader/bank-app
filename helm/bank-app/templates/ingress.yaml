{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bank-app.fullname" . }}
  labels:
    {{- include "bank-app.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ index .Values "bank-front-ui" "service" "name" }}
                port:
                  number: {{ index .Values "bank-front-ui" "service" "port" }}
          - path: /realms
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.keycloak.service.name }}
                port:
                  number: {{ .Values.keycloak.service.port }}
          - path: /resources
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.keycloak.service.name }}
                port:
                  number: {{ .Values.keycloak.service.port }}
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.keycloak.service.name }}
                port:
                  number: {{ .Values.keycloak.service.port }}
          - path: /js
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.keycloak.service.name }}
                port:
                  number: {{ .Values.keycloak.service.port }}
          - path: /zipkin
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.zipkin.service.name }}
                port:
                  number: {{ .Values.zipkin.service.port }}
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.prometheus.service.name }}
                port:
                  number: {{ .Values.prometheus.service.port }}
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.grafana.service.name }}
                port:
                  number: {{ .Values.grafana.service.port }}
          - path: /kibana
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.elk.kibana.service.name }}
                port:
                  number: {{ .Values.elk.kibana.service.port }}
{{- end }}
