spring:
  application:
    name: bank-notifications
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bank}?currentSchema=notifications
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  lifecycle:
    timeout-per-shutdown-phase: 30s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

kafka:
  topic:
    notifications:
      name: ${KAFKA_TOPIC_NOTIFICATIONS:notifications}
      partitions: ${KAFKA_TOPIC_NOTIFICATIONS_PARTITIONS:3}
      replicas: ${KAFKA_TOPIC_NOTIFICATIONS_REPLICAS:1}
      retention-ms: ${KAFKA_TOPIC_NOTIFICATIONS_RETENTION_MS:604800000}

server:
  port: ${SERVER_PORT:8085}
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
