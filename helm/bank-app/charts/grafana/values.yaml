service:
  name: grafana
  port: 3000

grafana:
  fullnameOverride: grafana
  service:
    port: 3000
    targetPort: 3000
  adminUser: admin
  adminPassword: admin
  grafana.ini:
    server:
      root_url: http://localhost/grafana
      serve_from_sub_path: true
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          access: proxy
          url: http://prometheus:9090/prometheus
          isDefault: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: bank-app
          orgId: 1
          folder: BankApp
          type: file
          allowUiUpdates: true
          options:
            path: /var/lib/grafana/dashboards/bankapp
            foldersFromFilesStructure: false
  dashboardsConfigMaps:
    bankapp: grafana-dashboards
