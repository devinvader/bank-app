kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    extraMounts: # кэш контейнеров, ибо до этого всегда пересоздавалось и перекачивалось
      - hostPath: /var/lib/kind-cache/bank-dev/containerd
        containerPath: /var/lib/containerd
