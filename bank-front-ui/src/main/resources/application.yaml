spring:
  http:
    client:
      connect-timeout: 5s
      read-timeout: 30s
  application:
    name: bank-front-ui
  session:
    store-type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: bank-front-ui
            client-secret: ${KEYCLOAK_CLIENT_SECRET:}
            client-authentication-method: none
            authorization-grant-type: authorization_code
            scope: openid, profile, accounts:read, accounts:write, cash:operate, transfer:execute
            redirect-uri: "${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/keycloak"
        provider:
          keycloak:
            authorization-uri: ${KEYCLOAK_EXTERNAL_URL:http://localhost:8089}/realms/${KEYCLOAK_REALM:bank}/protocol/openid-connect/auth
            token-uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8089}/realms/${KEYCLOAK_REALM:bank}/protocol/openid-connect/token
            jwk-set-uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8089}/realms/${KEYCLOAK_REALM:bank}/protocol/openid-connect/certs
            end-session-endpoint: ${KEYCLOAK_EXTERNAL_URL:http://localhost:8089}/realms/${KEYCLOAK_REALM:bank}/protocol/openid-connect/logout
            user-name-attribute: sub

gateway:
  service-id: bank-gateway

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      accountsGateway:
        base-config: default
        ignore-exceptions:
          - ru.devinvader.bank.frontui.exception.InsufficientFundsException
          - ru.devinvader.bank.frontui.exception.BadRequestException
          - ru.devinvader.bank.frontui.exception.UnauthorizedException
      cashGateway:
        base-config: default
        ignore-exceptions:
          - ru.devinvader.bank.frontui.exception.InsufficientFundsException
          - ru.devinvader.bank.frontui.exception.BadRequestException
          - ru.devinvader.bank.frontui.exception.UnauthorizedException
      transferGateway:
        base-config: default
        ignore-exceptions:
          - ru.devinvader.bank.frontui.exception.InsufficientFundsException
          - ru.devinvader.bank.frontui.exception.BadRequestException
          - ru.devinvader.bank.frontui.exception.UnauthorizedException

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
