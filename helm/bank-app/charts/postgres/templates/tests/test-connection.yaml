apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Values.service.name }}-test"
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test
      image: postgres:15
      command:
        - pg_isready
        - -h
        - {{ .Values.service.name }}
        - -U
        - {{ .Values.config.username }}
      env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.service.name }}-secret
              key: password
  restartPolicy: Never
