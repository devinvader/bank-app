apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.service.name }}-config
  labels:
    app: {{ .Values.service.name }}
data:
  realm-export.json: |
    {
      "id": "bank",
      "realm": "bank",
      "displayName": "Bank",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": true,
      "accessTokenLifespan": 300,
      "accessTokenLifespanForImplicitFlow": 300,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 36000,
      "offlineSessionIdleTimeout": 2592000,
      "offlineSessionMaxLifespanEnabled": false,
      "accessCodeLifespan": 60,
      "accessCodeLifespanUserAction": 300,
      "accessCodeLifespanLogin": 1800,
      "actionTokenGeneratedByAdminLifespan": 43200,
      "actionTokenGeneratedByUserLifespan": 300,
      "oauth2DeviceCodeLifespan": 600,
      "oauth2DevicePollingInterval": 5,
      "defaultRole": {
        "name": "default-roles-bank",
        "description": "${role_default-roles}",
        "composite": true,
        "clientRole": false,
        "containerId": "bank"
      },
      "users": [
        {"username":"user1","enabled":true,"emailVerified":true,"firstName":"Иван","lastName":"Иванов","email":"user1@example.com","credentials":[{"type":"password","value":"password","temporary":false}],"realmRoles":["default-roles-bank"]},
        {"username":"user2","enabled":true,"emailVerified":true,"firstName":"Петр","lastName":"Петров","email":"user2@example.com","credentials":[{"type":"password","value":"password","temporary":false}],"realmRoles":["default-roles-bank"]},
        {"username":"user3","enabled":true,"emailVerified":true,"firstName":"Сергей","lastName":"Сергеев","email":"user3@example.com","credentials":[{"type":"password","value":"password","temporary":false}],"realmRoles":["default-roles-bank"]},
        {"username":"user4","enabled":true,"emailVerified":true,"firstName":"Анна","lastName":"Андреева","email":"user4@example.com","credentials":[{"type":"password","value":"password","temporary":false}],"realmRoles":["default-roles-bank"]},
        {"username":"user5","enabled":true,"emailVerified":true,"firstName":"Мария","lastName":"Маркова","email":"user5@example.com","credentials":[{"type":"password","value":"password","temporary":false}],"realmRoles":["default-roles-bank"]},
        {"username":"user6","enabled":true,"emailVerified":true,"firstName":"Алексей","lastName":"Алексеев","email":"user6@example.com","credentials":[{"type":"password","value":"password","temporary":false}],"realmRoles":["default-roles-bank"]},
        {"username":"user7","enabled":true,"emailVerified":true,"firstName":"Дмитрий","lastName":"Дмитриев","email":"user7@example.com","credentials":[{"type":"password","value":"password","temporary":false}],"realmRoles":["default-roles-bank"]}
      ],
      "clients": [
        {"clientId":"bank-front-ui","enabled":true,"publicClient":true,"standardFlowEnabled":true,"implicitFlowEnabled":false,"directAccessGrantsEnabled":true,"serviceAccountsEnabled":false,"redirectUris":["http://localhost:8080/*","/*"],"webOrigins":["+"],"defaultClientScopes":["web-origins","acr","profile","roles","email"],"optionalClientScopes":["accounts:read","accounts:write","cash:operate","transfer:execute","notifications:send"]},
        {"clientId":"bank-gateway","enabled":true,"publicClient":false,"bearerOnly":true,"secret":"gateway-secret"},
        {"clientId":"bank-accounts","enabled":true,"publicClient":false,"bearerOnly":false,"serviceAccountsEnabled":true,"standardFlowEnabled":false,"implicitFlowEnabled":false,"directAccessGrantsEnabled":false,"secret":"accounts-secret","defaultClientScopes":["web-origins","acr","profile","roles","email"],"optionalClientScopes":["notifications:send"]},
        {"clientId":"bank-cash","enabled":true,"publicClient":false,"bearerOnly":false,"serviceAccountsEnabled":true,"standardFlowEnabled":false,"implicitFlowEnabled":false,"directAccessGrantsEnabled":false,"secret":"cash-secret","defaultClientScopes":["web-origins","acr","profile","roles","email"],"optionalClientScopes":["accounts:read","accounts:write","notifications:send"]},
        {"clientId":"bank-transfer","enabled":true,"publicClient":false,"bearerOnly":false,"serviceAccountsEnabled":true,"standardFlowEnabled":false,"implicitFlowEnabled":false,"directAccessGrantsEnabled":false,"secret":"transfer-secret","defaultClientScopes":["web-origins","acr","profile","roles","email"],"optionalClientScopes":["accounts:read","accounts:write","notifications:send"]},
        {"clientId":"bank-notifications","enabled":true,"publicClient":false,"bearerOnly":true,"secret":"notifications-secret"}
      ],
      "clientScopes": [
        {"name":"accounts:read","description":"Read account data","protocol":"openid-connect","attributes":{"include.in.token.scope":"true","display.on.consent.screen":"true"}},
        {"name":"accounts:write","description":"Write account data","protocol":"openid-connect","attributes":{"include.in.token.scope":"true","display.on.consent.screen":"true"}},
        {"name":"cash:operate","description":"Perform cash operations","protocol":"openid-connect","attributes":{"include.in.token.scope":"true","display.on.consent.screen":"true"}},
        {"name":"transfer:execute","description":"Execute transfers","protocol":"openid-connect","attributes":{"include.in.token.scope":"true","display.on.consent.screen":"true"}},
        {"name":"notifications:send","description":"Send notifications","protocol":"openid-connect","attributes":{"include.in.token.scope":"true","display.on.consent.screen":"true"}}
      ]
    }
