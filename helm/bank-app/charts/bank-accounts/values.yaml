replicaCount: 1
image:
  repository: bank-accounts
  tag: latest
  pullPolicy: IfNotPresent
service:
  name: bank-accounts
  port: 80
  targetPort: 8082
config:
  data:
    SERVER_PORT: "8082"
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: bank
    DB_USERNAME: postgres
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/bank?currentSchema=accounts"
    KEYCLOAK_HOST: keycloak
    KEYCLOAK_PORT: "80"
    KEYCLOAK_REALM: bank
    IMPORT_DEMO_DATA: "true"
    KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    KAFKA_TOPIC_NOTIFICATIONS: "notifications"
secret:
  data:
    DB_PASSWORD: postgres
