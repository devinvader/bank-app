replicaCount: 1
image:
  repository: quay.io/keycloak/keycloak
  tag: latest
service:
  name: keycloak
  port: 80
  targetPort: 8089
config:
  realm: bank
  dbHost: postgres
  dbPort: "5432"
  dbName: bank
  dbUsername: postgres
  javaOpts: "-Xms256m -Xmx1024m"
resources:
  limits:
    memory: "1536Mi"
    cpu: "1000m"
  requests:
    memory: "512Mi"
    cpu: "250m"
secrets:
  adminUsername: admin
  adminPassword: admin
  dbPassword: postgres
