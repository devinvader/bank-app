spring:
  config:
    import: ""
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.reactive.ReactiveOAuth2ClientAutoConfiguration
      - org.springframework.cloud.consul.ConsulAutoConfiguration
      - org.springframework.cloud.consul.discovery.ConsulDiscoveryClientAutoConfiguration
      - org.springframework.cloud.consul.config.ConsulConfigAutoConfiguration
  application:
    name: bank-gateway-test
  cloud:
    consul:
      enabled: false
      config:
        enabled: false
      discovery:
        enabled: false

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      accountsCircuitBreaker:
        base-config: default
      cashCircuitBreaker:
        base-config: default
      transferCircuitBreaker:
        base-config: default
      notificationsCircuitBreaker:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 0
