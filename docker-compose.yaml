services:
  postgres:
    image: postgres:15
    container_name: bank-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql
    networks:
      - bank-network
    healthcheck: # случалось такое, что не работает из-за этого. Добавлю, хоть и по заданию вроде не надо
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bank-redis
    ports:
      - "6379:6379"
    networks:
      - bank-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    container_name: bank-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: bank-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=keycloak
      KC_DB_USERNAME: ${DB_USERNAME}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HOSTNAME: http://localhost:8089
      KC_HTTP_PORT: ${KEYCLOAK_PORT}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "${KEYCLOAK_PORT}:${KEYCLOAK_PORT}"
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/keycloak/${KEYCLOAK_PORT} && echo -e 'GET /realms/${KEYCLOAK_REALM}/.well-known/openid-configuration HTTP/1.0\\r\\nHost: keycloak\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'issuer'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  bank-accounts:
    build:
      context: .
      target: bank-accounts
    container_name: bank-accounts
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
      logstash:
        condition: service_started
    env_file: .env
    environment:
      SERVER_PORT: 8082
      DB_SCHEMA: accounts
      DB_HOST: postgres
      REDIS_HOST: redis
      IMPORT_DEMO_DATA: ${IMPORT_DEMO_DATA:-false}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: logstash
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    networks:
      - bank-network

  bank-cash:
    build:
      context: .
      target: bank-cash
    container_name: bank-cash
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
      logstash:
        condition: service_started
    env_file: .env
    environment:
      SERVER_PORT: 8083
      DB_SCHEMA: cash
      DB_HOST: postgres
      REDIS_HOST: redis
      KEYCLOAK_CLIENT_SECRET: cash-secret
      ACCOUNTS_BASE_URL: http://bank-accounts:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: logstash
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    networks:
      - bank-network

  bank-transfer:
    build:
      context: .
      target: bank-transfer
    container_name: bank-transfer
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
      logstash:
        condition: service_started
    env_file: .env
    environment:
      SERVER_PORT: 8084
      DB_SCHEMA: transfer
      DB_HOST: postgres
      REDIS_HOST: redis
      KEYCLOAK_CLIENT_SECRET: transfer-secret
      ACCOUNTS_BASE_URL: http://bank-accounts:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: logstash
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    networks:
      - bank-network

  bank-notifications:
    build:
      context: .
      target: bank-notifications
    container_name: bank-notifications
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
      logstash:
        condition: service_started
    env_file: .env
    environment:
      SERVER_PORT: 8085
      DB_SCHEMA: notifications
      DB_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: logstash
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    networks:
      - bank-network

  bank-gateway:
    build:
      context: .
      target: bank-gateway
    container_name: bank-gateway
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      zipkin:
        condition: service_started
      logstash:
        condition: service_started
    env_file: .env
    environment:
      SERVER_PORT: 8081
      DB_SCHEMA: gateway
      DB_HOST: postgres
      REDIS_HOST: redis
      ACCOUNTS_SERVICE_URL: http://bank-accounts:8082
      CASH_SERVICE_URL: http://bank-cash:8083
      TRANSFER_SERVICE_URL: http://bank-transfer:8084
      SPRING_PROFILES_ACTIVE: logstash
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    networks:
      - bank-network

  bank-front-ui:
    build:
      context: .
      target: bank-front-ui
    container_name: bank-front-ui
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      zipkin:
        condition: service_started
      logstash:
        condition: service_started
    env_file: .env
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      REDIS_HOST: redis
      GATEWAY_SERVICE_ID: bank-gateway:8081
      SPRING_PROFILES_ACTIVE: logstash
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    ports:
      - "8080:8080"
    networks:
      - bank-network

  zipkin:
    image: openzipkin/zipkin:3
    container_name: bank-zipkin
    environment:
      STORAGE_TYPE: mem
    ports:
      - "9411:9411"
    networks:
      - bank-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: bank-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: bank-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - ./helm/bank-app/charts/elk/config/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./monitoring/logstash/pipeline.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5000:5000"
      - "9600:9600"
    networks:
      - bank-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: bank-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - bank-network

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: bank-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./helm/bank-app/charts/prometheus/alerts/alerting_rules.yml:/etc/prometheus/alerting_rules.yml
    ports:
      - "9090:9090"
    networks:
      - bank-network

  grafana:
    image: grafana/grafana:12.3.1
    container_name: bank-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./helm/bank-app/charts/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - bank-network

volumes:
  postgres-data:
  kafka-data:
  es-data:
  grafana-data:

networks:
  bank-network:
    driver: bridge
